<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <title>Sanmu Portfolio</title>

    <link rel="stylesheet" href="./src/style.css">
    <!-- 引入 jQuery（CDN），先于 Paper.js 加载，便于后续脚本统一使用 -->

    <canvas id="myCanvas" resize></canvas> -->

    </div>

            </div>
            <div>
                <div>
                    <img
                        src="https://picsum.photos/id/64/1040/800"
                        alt="Sandra portrait"
                    >
                </div>
                <div>GO CHECK OUT · MY PROJECTS · </div>
            </div>
        </div>
        <div></div>
        <div></div>

    <!-- 业务脚本，使用 type="module" 便于后续模块化 -->
    <script type="module" src="./src/main.js"></script>

</html>
