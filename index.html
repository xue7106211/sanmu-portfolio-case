<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanmu Portfolio</title>
    <!-- 预连接 Google Fonts，提前建立 TLS 通道，加快字体加载 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- 引入 Inter 字体家族，作为 Helvetica Neue 在非 macOS 系统下的补底 -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap">
    <!-- 引入外部样式表 -->
    <link rel="stylesheet" href="./src/style.css">
    <!-- 引入 jQuery（CDN），先于 Paper.js 加载，便于后续脚本统一使用 -->
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <!-- 引入 Paper.js（CDN） -->
    <script src="https://cdn.jsdelivr.net/npm/paper@0.12.18/dist/paper-full.min.js"></script>
    <!-- 引入 GSAP 核心（CDN）。GSAP 会把 gsap 对象挂到 window 上，
         module 脚本里可以直接使用全局 gsap，无需 import。
         注意：GSAP 必须在使用它的脚本之前加载，所以放在 main.js 之前。 -->
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <!-- 引入 ScrollTrigger 插件（GSAP 3 起免费）。
         ScrollTrigger 会把同名对象挂到 window 上，main.js 里需要用
         gsap.registerPlugin(ScrollTrigger) 注册一次后才能使用。 -->
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
    <!-- 引入 ScrambleTextPlugin（GSAP 自有 CDN）。
         注意：原 Club 插件 ScrambleTextPlugin 虽然 2025 起免费授权，
         但发行渠道仍是 GreenSock 自己。jsdelivr 上的公开 npm `gsap` 包里
         没有这个插件文件（404）。开发期可用官方提供的 `gsap-trial` 包试用，
         生产环境需要从 https://gsap.com 注册账号后用私有 npm 包替换。 -->
    <script src="https://cdn.jsdelivr.net/npm/gsap-trial@3.12.5/dist/ScrambleTextPlugin.min.js"></script>
</head>

<body>
    <!-- Paper.js 画布，resize 属性会让画布自动适配窗口尺寸
    <canvas id="myCanvas" resize></canvas> -->

    <div class="mousePointer">
    </div>

    <div class="container">
        <div class="info-header">
            <div class="top-bar">
                <span class="brand">Portfolio</span>
                <div class="badge" data-bigdot="true">OFFICIAL<br>DESIGN<br>AWARDS</div>
                <!-- 用 input + label 实现纯 CSS 开关：input 隐藏但仍可被键盘聚焦，
                     label 通过 for 与 input 关联，点击 label 即可切换 :checked 状态 -->
                <input type="checkbox" id="toggle-old-school" class="toggle__input" />
                <label for="toggle-old-school" class="toggle" data-bigdot="true">
                    <!-- 开关轨道（外壳）+ 滑块（thumb），位置切换全靠 :checked -->
                    <span class="toggle__switch" aria-hidden="true">
                        <span class="toggle__thumb"></span>
                    </span>
                    <span class="toggle__text">Switch to<br>old school</span>
                </label>
            </div>
            <div class="hero">
                <p class="hero__greeting">Hi —</p>
                <span class="hero__title">I'm Sandra, frontend developer and designer.</span>
            </div>
            <div class="media">
                <div class="portrait portrait--front">
                    <img src="https://picsum.photos/id/64/1040/800" alt="Sandra portrait">
                </div>
                <div class="portrait portrait--secondary">
                    <img src="https://picsum.photos/id/1027/1040/800" alt="Portrait of a woman">
                </div>
                <div class="circle-text" data-bigdot="true">
                    <!-- 用 SVG textPath 让文字沿圆形路径排列；定义一个不可见的圆当轨道 -->
                    <svg viewBox="0 0 120 120" width="120" height="120">
                        <defs>
                            <!-- 半径 50，圆心 (60,60)。从 12 点位置(60,10)开始顺时针绕一圈 -->
                            <path id="circlePath" d="M 60,60 m -50,0 a 50,50 0 1,1 100,0 a 50,50 0 1,1 -100,0" />
                        </defs>
                        <text font-size="12" letter-spacing="2" fill="#111">
                            <textPath href="#circlePath">GO CHECK OUT · MY PROJECTS · GO CHECK OUT · MY PROJECTS ·
                            </textPath>
                        </text>
                    </svg>
                </div>
            </div>
        </div>

        <!-- =================================================================
             第二屏：Selected works
             结构：
               .works
                 ├─ .works__label  ── 小标签 "Selected works"
                 └─ .works__list   ── ol 列表，li 内包含编号 + 名称
             说明：
               - 用 <ol> 保留列表语义，编号靠 ::before 绘制（"01 /"），
                 这样 HTML 里就只写名称，结构干净；
               - 也可以直接写在 li 里，这里选择 ::before + counter 的方式，
                 既保留了无障碍语义（数字会被读屏读出），也方便统一改样式。
             ================================================================= -->
        <section class="works">
            <p class="works__label">Selected works</p>
            <!-- 每个 li 通过 data-thumb 携带缩略图 URL；JS 在 hover 时把它换到浮动 thumb 容器里 -->
            <ol class="works__list">
                <li class="works__item" data-bigdot="true" data-thumb="https://picsum.photos/id/1015/600/400">Recongroup
                </li>
                <li class="works__item" data-bigdot="true" data-thumb="https://picsum.photos/id/1018/600/400">Glassland
                </li>
                <li class="works__item" data-bigdot="true" data-thumb="https://picsum.photos/id/1043/600/400">PEFC</li>
                <li class="works__item" data-bigdot="true" data-thumb="https://picsum.photos/id/1069/600/400">Biosphere
                    Lab Lungau</li>
                <li class="works__item" data-bigdot="true" data-thumb="https://picsum.photos/id/1074/600/400">ZIID</li>
                <li class="works__item" data-bigdot="true" data-thumb="https://picsum.photos/id/110/600/400">Hotel
                    Gambswirt</li>
                <li class="works__item" data-bigdot="true" data-thumb="https://picsum.photos/id/119/600/400">More works
                </li>
            </ol>

            <!-- 浮动缩略图容器：position: fixed，跟随鼠标移动；
                 默认 opacity: 0 + pointer-events: none，不会拦截下方元素的鼠标事件 -->
            <div class="works__thumb" aria-hidden="true">
                <img class="works__thumb-img" src="" alt="">
            </div>
        </section>
    </div>


    <!-- 业务脚本，使用 type="module" 便于后续模块化 -->
    <script type="module" src="./src/main.js"></script>
</body>

</html>
